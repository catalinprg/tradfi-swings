# Market-wide context tickers fetched once per run and attached to every
# instrument payload as `market_context`. Agent uses them for positioning
# adjustments (class-specific). Lives outside `instruments:` so they are
# never published as their own briefings.
context:
  vix:
    symbol: "^VIX"
    display: "VIX"
  dxy:
    symbol: "DX-Y.NYB"
    display: "Dollar Index"
