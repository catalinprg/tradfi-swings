# TradFi swings watchlist.
#
# Each instrument is keyed by a short lowercase slug used for:
#   - CLI arg (python -m scripts.emit_payload eurusd)
#   - data/{slug}/payload.json
#   - data/{slug}/briefing.md
#   - Notion page title uses `display`
#
# News source preferences per instrument:
#   - `finnhub_symbol`    → Finnhub company-news endpoint (US equities only)
#   - `marketaux_symbol`  → MARKETAUX /news/all (forex, commodities)
#   - `rss_query`         → Google News RSS fallback (indices, anything without
#                           a better source). Also used as the fallback when
#                           Finnhub / MARKETAUX return nothing fresh.
#   - `relevance_terms`   → substrings the analyst uses to filter macro_context
#                           down to this instrument.
#
# Every instrument uses the same 4-TF set: 5m, 1h, 1d, 1w.

instruments:
  # Forex majors
  eurusd:
    symbol: "EURUSD=X"
    display: "EUR/USD"
    asset_class: "forex"
    notion_parent: "345b7f28c04480d7a186c8786eab95c4"
    finnhub_symbol: null
    marketaux_symbol: "EURUSD"
    rss_query: "euro dollar EUR USD exchange rate today"
    relevance_terms: ["EUR/USD", "EURUSD", "euro dollar", "euro-dollar", "ECB"]
  gbpusd:
    symbol: "GBPUSD=X"
    display: "GBP/USD"
    asset_class: "forex"
