name: Update economic calendar mirror

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Fetch ForexFactory calendar
        run: |
          mkdir -p data-mirror
          curl -fsSL --max-time 20 --retry 3 --retry-delay 5 \
            "https://nfs.faireconomy.media/ff_calendar_thisweek.json" \
            -o data-mirror/ff_calendar_thisweek.json
          python3 -c "import json; d=json.load(open('data-mirror/ff_calendar_thisweek.json')); assert isinstance(d, list) and len(d) > 0, 'empty payload'; print(f'fetched {len(d)} events')"

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data-mirror/ff_calendar_thisweek.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: refresh economic calendar mirror"
            git push
          fi
